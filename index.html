<!DOCTYPE html>
<html lang="en">

<head>

    <title>Travel Gallery</title>

    <link rel="stylesheet" href="sss.css">

</head>

<body>

    <h1>TRAVEL GALLERY</h1>

    <div class="gallery">

        <div class="tile">
            <img src="beach.jpg" alt="Beach">
        </div>

        <div class="tile">
            <img src="mountain.jpg" alt="Mountain">
        </div>

        <div class="tile">
            <img src="waterfall.jpg" alt="Waterfall">
        </div>

        <div class="tile">
            <img src="forest.jpg" alt="Forest">
        </div>

        <div class="tile">
            <img src="desert.jpg" alt="Desert">
        </div>

        <div class="tile">
            <img src="lake.jpg" alt="Lake">
        </div>

        <div class="tile">
            <img src="bridge.jpg" alt="Bridge">
        </div>

        <div class="tile">
            <img src="sunset.jpg" alt="Sunset">
        </div>

    </div>

    <div class="sticky-logo">
        <img src="travel.jpg" alt="Logo">
    </div>

</body>

</html>
